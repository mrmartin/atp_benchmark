# Pinned Lean project for the ATP harness.
#
# Lean toolchain: leanprover/lean4:v4.27.0 (see lean-toolchain).
# Mathlib commit: a3a10db0e9d66acbebf76c5e6a135066525ac900 (tag v4.27.0).
#
# Pinned to match PutnamBench's own Lean+mathlib pins (commit
# 77ea5a04b28b284f2b95f5c02dd46096bf75d33b on main, 2026-04-20) so problem
# statements drop in unmodified.
#
# Do NOT update either pin after pre-registration; that would invalidate the
# experiment.

name = "atp_harness"
defaultTargets = ["AtpHarness"]

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "a3a10db0e9d66acbebf76c5e6a135066525ac900"

[[lean_lib]]
name = "AtpHarness"
